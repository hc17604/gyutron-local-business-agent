services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      GYUTRON_DATA_DIR: ${GYUTRON_DATA_DIR:-/app/data}
      GYUTRON_WORKSPACE_ROOT: ${GYUTRON_WORKSPACE_ROOT:-/app}
      GYUTRON_API_PORT: ${GYUTRON_API_PORT:-8000}
    ports:
      - "${GYUTRON_API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${GYUTRON_WEB_PORT:-3000}:5173"
    depends_on:
      - api
