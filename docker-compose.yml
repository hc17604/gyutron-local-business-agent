services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      GYUTRON_DATA_DIR: /app/data
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

